    // --- 削除・複製処理 ---
    async function deleteCurrentItem() {
      if(!currentId) return;

      if(duplicatePending) resetActionStates();

      const btn = document.getElementById('btn-delete');
      const btnMob = document.getElementById('btn-delete-mobile');
      const msg = document.getElementById('action-confirm-msg');

      if (!deletePending) {
        deletePending = true;
        msg.classList.remove('hidden');
        msg.classList.add('border-red-200', 'text-red-500');
        msg.innerHTML = '⚠️ 本当に削除しますか？<br>（もう一度クリック）';

        btn.classList.add('bg-red-50', 'border-red-400');
        btnMob.classList.add('bg-red-500', 'text-white');
        btnMob.textContent = '確定';
        showToast('⚠️ もう一度押すと削除');
        return;
      }

      if(editMode === 'draft') {
        selectedDraftIds.delete(String(currentId));
        removeDraftFromBatchQueue(currentId);
        await db.drafts.delete(currentId);
        showToast('🗑️ 下書きを削除しました');
        createNew();
      } else {
        // header, footer, snippet
        let table;
        if(editMode === 'header') table = db.headers;
        else if(editMode === 'footer') table = db.footers;
        else if(editMode === 'snippet') table = db.snippets;

        await table.delete(currentId);
        showToast('🗑️ 削除しました');
        currentId = null;
        quill.root.innerHTML = '';
        document.getElementById('input-hf-name').value = '';
        setEditorUI(editMode, false);
        
        if(editMode === 'snippet') {
            loadSnippetList();
            loadQuickSnippets();
        } else {
             loadSettingsList();
             updateDropdowns();
        }
      }
      resetActionStates();
      updateSelectedDraftCountUI();
    }

    async function duplicateCurrentItem() {
      if(!currentId) return;

      if(deletePending) resetActionStates();

      // ★ 追加: Snippetの場合の個数制限チェック
      if (editMode === 'snippet') {
        const count = await db.snippets.count();
        if (count >= QUICK_SNIPPET_LIMIT) {
          showToast(`⚠️ 定型文は最大${QUICK_SNIPPET_LIMIT}つまでです`);
          resetActionStates(); // 複製確認状態をリセット
          return;
        }
      }

      const btn = document.getElementById('btn-duplicate');
      const btnMob = document.getElementById('btn-duplicate-mobile');
      const msg = document.getElementById('action-confirm-msg');

      if (!duplicatePending) {
        duplicatePending = true;
        msg.classList.remove('hidden');
        msg.classList.add('border-cyan-200', 'text-cyan-600');
        msg.innerHTML = '複製しますか？<br>（もう一度クリック）';

        btn.classList.add('bg-cyan-100', 'border-cyan-500');
        btn.textContent = '確定';
        btnMob.classList.add('bg-cyan-500', 'text-white');
        btnMob.textContent = '確定';
        showToast('もう一度押すと複製');
        return;
      }

      let table;
      if(editMode === 'draft') table = db.drafts;
      else if(editMode === 'header') table = db.headers;
      else if(editMode === 'footer') table = db.footers;
      else if(editMode === 'snippet') table = db.snippets;

      const original = await table.get(currentId);
      
      if(original) {
        const nowObj = new Date();
        const displayDate = nowObj.toLocaleString('ja-JP'); 
        const sortDate = nowObj.toISOString();

        const newItem = { ...original };
        delete newItem.id;
        newItem.createdAt = sortDate;
        newItem.sortDate = sortDate;
        newItem.updatedAt = displayDate;
        
        if(newItem.subject) newItem.subject += " のコピー";
        if(newItem.name) newItem.name += " のコピー";
        
        // Snippet複製の場合、orderを調整（直下に）
        if (editMode === 'snippet' && newItem.order !== undefined) {
            newItem.order = newItem.order + 0.5; // 簡易的に間に挟む
        }

        const newId = await table.add(newItem);
        showToast('✨ 複製しました！');

        if(editMode === 'draft') {
          loadDraft(newId);
        } else if(editMode === 'snippet') {
          loadSnippetEditor(newId);
          loadQuickSnippets();
        } else {
          loadHFEditor(editMode, newId);
          updateDropdowns();
        }
      }
      resetActionStates();
    }

    // --- 9. プルダウン更新 & キャッシュ更新 ---
    async function updateDropdowns() {
      let headers = await db.headers.toArray();
      let footers = await db.footers.toArray();
      
      headers = sortByCreatedAt(headers);
      footers = sortByCreatedAt(footers);

      const hSelect = document.getElementById('select-header');
      const fSelect = document.getElementById('select-footer');
      const currentH = hSelect.value;
      const currentF = fSelect.value;

      hSelect.innerHTML = '<option value="">（選択なし）</option>';
      fSelect.innerHTML = '<option value="">（選択なし）</option>';

      headers.forEach(h => {
        const opt = document.createElement('option');
        opt.value = h.id;
        opt.textContent = h.name;
        hSelect.appendChild(opt);
      });
      footers.forEach(f => {
        const opt = document.createElement('option');
        opt.value = f.id;
        opt.textContent = f.name;
        fSelect.appendChild(opt);
      });

      hSelect.value = currentH;
      fSelect.value = currentF;
      
      // ドロップダウン更新後にキャッシュも更新
      await updateHFCache();
    }

    // ★★★ キャッシュ更新関数 ★★★
    async function updateHFCache() {
       const hId = document.getElementById('select-header').value;
       const fId = document.getElementById('select-footer').value;

       cachedHeaderContent = '';
       cachedFooterContent = '';

       if(hId && hId !== "") {
         const h = await db.headers.get(parseInt(hId));
         if(h) cachedHeaderContent = h.content;
       }
       if(fId && fId !== "") {
         const f = await db.footers.get(parseInt(fId));
         if(f) cachedFooterContent = f.content;
       }
    }

    // --- ステータス表示制御 ---
    let statusTimer = null;
    const statusEl = document.getElementById('status-msg');

    function updateHeaderStatus(msg, autoHide = false) {
      if (!statusEl) return;
      if (statusTimer) clearTimeout(statusTimer);
      
      statusEl.textContent = msg;
      
      if(msg) {
        statusEl.classList.remove('opacity-0'); 
      } else {
        statusEl.classList.add('opacity-0');
        return;
      }

      if (autoHide) {
        statusTimer = setTimeout(() => {
          statusEl.classList.add('opacity-0');
        }, 1500);
      }
    }

    // --- 10. 自動保存 ---
    async function autoSave() {
      if (deletePending || duplicatePending) return;

      const content = quill.root.innerHTML;
      const nowObj = new Date();
      const displayDate = nowObj.toLocaleString('ja-JP'); 
      const sortDate = nowObj.toISOString(); 

      if(editMode === 'draft') {
        const subject = document.getElementById('input-subject').value;
        const folderId = parseInt(document.getElementById('select-draft-folder').value);
        const draftDate = getDraftDateIso();
        const text = quill.getText().trim();
        
        if (currentId && subject === lastSavedSnapshot.subject && content === lastSavedSnapshot.content) {
          if (folderId === lastSavedSnapshot.folderId && draftDate === lastSavedSnapshot.draftDate) {
            updateHeaderStatus('☁️ 保存済み', true);
            return;
          }
        }

        if (Number.isNaN(folderId)) {
          showToast('⚠️ 保存先フォルダを選択してください');
          updateHeaderStatus('✍️ 執筆中...');
          return; 
        }

        if (!currentId && !subject && text.length === 0) {
           updateHeaderStatus('', false); 
           return;
        }
        
        const data = { subject, content, folderId, sortDate, updatedAt: displayDate, createdAt: draftDate };
        
        if (currentId) {
          await db.drafts.update(currentId, data);
        } else {
          currentId = await db.drafts.add(data);
          setEditorUI('draft', true); 
        }
        
        lastSavedSnapshot = { subject, content, name: '', folderId, draftDate };
        currentDraftFolderId = folderId;
        loadDraftList();

      } else {
        // Header, Footer, Snippet
        const name = document.getElementById('input-hf-name').value || '名称未設定';
        
        if (currentId && name === lastSavedSnapshot.name && content === lastSavedSnapshot.content) {
          updateHeaderStatus('☁️ 保存済み', true);
          return;
        }

        let table;
        if(editMode === 'header') table = db.headers;
        else if(editMode === 'footer') table = db.footers;
        else if(editMode === 'snippet') table = db.snippets;

        const data = { name, content, sortDate, updatedAt: displayDate };
        
        if (currentId) {
          await table.update(currentId, data);
        } else {
          // 新規作成時
          data.createdAt = sortDate;
          
          if(editMode === 'snippet') {
              // 指定されたorderがあれば使う（createSnippetで設定）
              if(window.tempNewSnippetOrder !== undefined) {
                  data.order = window.tempNewSnippetOrder;
                  window.tempNewSnippetOrder = undefined;
              } else {
                  // なければ先頭に追加(min-1)
                  const first = await db.snippets.orderBy('order').first();
                  data.order = first ? first.order - 1 : 0;
              }
          }
          
          const newId = await table.add(data);
          currentId = newId;
          setEditorUI(editMode, true);
        }

        lastSavedSnapshot = { subject: '', content, name, folderId: null, draftDate: '' };
        
        if(editMode === 'snippet') {
            loadSnippetList();
            loadQuickSnippets(); 
        } else {
            loadSettingsList();
            updateDropdowns();
        }
      }
      
      updateHeaderStatus('☁️ 自動保存しました', true);
    }

    // --- 11. 便利機能 (コピー・Zip・バックアップ) ---
    function stripHtml(html) {
      const tmp = document.createElement("DIV");
      let text = html.replace(/<br\s*\/?>/gi, '\n');
      text = text.replace(/<\/p>/gi, '\n');
      text = text.replace(/<\/div>/gi, '\n');
      tmp.innerHTML = text;
      return tmp.innerText || tmp.textContent || "";
    }

    function forceCopyToClipboard(text) {
      const textArea = document.createElement("textarea");
      textArea.value = text;
      textArea.style.position = "fixed";
      textArea.style.left = "-9999px";
      textArea.style.top = "0";
      document.body.appendChild(textArea);
      textArea.focus();
      textArea.select();

      try {
        const successful = document.execCommand('copy');
        if(successful) {
           showToast('📋 コピー成功！');
        } else {
           showToast('❌ コピー失敗');
        }
      } catch (err) {
        showToast('❌ エラー: コピーできませんでした');
      }
      document.body.removeChild(textArea);
    }

    function applyLinkStyles(html) {
       const div = document.createElement('div');
       div.innerHTML = html;
       const links = div.querySelectorAll('a');
       links.forEach(link => {
           link.style.color = '#2563eb';
           link.style.textDecoration = 'underline';
       });
       return div.innerHTML;
    }

    function applyStylesToLines(html, fontSize) {
       const div = document.createElement('div');
       div.innerHTML = applyLinkStyles(html);
       const targets = div.querySelectorAll('p, li, h1, h2, h3, h4, h5, h6, blockquote');
       targets.forEach(el => {
           const hasStyle = el.style.fontSize;
           const hasNestedBlocks = !!el.querySelector('p, ul, ol, div, blockquote, h1, h2, h3, h4, h5, h6');

           if (hasStyle) return;

           if (hasNestedBlocks) {
               el.style.fontSize = fontSize;
               return;
           }

           const span = document.createElement('span');
           span.style.fontSize = fontSize;

           while (el.firstChild) {
               span.appendChild(el.firstChild);
           }

           el.appendChild(span);
       });
       return div.innerHTML;
    }

    function copyHtml() {
      const body = quill.root.innerHTML;
      let innerHtml = `${cachedHeaderContent}\n${body}\n${cachedFooterContent}`;

      const nameMode = document.getElementById('select-name-convert').value;
      if (nameMode === 'convert') {
        innerHtml = innerHtml.replaceAll('あなた', '{{nickname}}さん');
      }

      const currentFontSize = localStorage.getItem('editor-font-size') || '16px';
      const finalHtml = applyStylesToLines(innerHtml, currentFontSize);

      forceCopyToClipboard(finalHtml);
    }

    function copyTextOnly() {
      const body = quill.getText();
      const textHeader = stripHtml(cachedHeaderContent);
      const textFooter = stripHtml(cachedFooterContent);
      
      let finalString = `${textHeader}\n\n${body}\n\n${textFooter}`;
      finalString = finalString.replace(/^\n+/, '').replace(/\n+$/, '');

      const nameMode = document.getElementById('select-name-convert').value;
      if (nameMode === 'convert') {
        finalString = finalString.replaceAll('あなた', '{{nickname}}さん');
      }

      forceCopyToClipboard(finalString);
    }

    function copyBodyOnly() {
      const body = quill.root.innerHTML;
      forceCopyToClipboard(applyLinkStyles(body));
    }

    function copyDraftBodyHtml(html) {
      forceCopyToClipboard(applyLinkStyles(html || ''));
    }

    function triggerWpPostAction() {
      const extensionBtn = document.getElementById('wp-post-button');
      if (extensionBtn) {
        document.documentElement.setAttribute('data-mailcopy-wp-batch', 'true');
        document.documentElement.removeAttribute('data-mailcopy-wp-post-result');
        extensionBtn.click();
        return true;
      }

      const btn = document.getElementById('btn-wp');
      if (btn) {
        showToast('⚠️ 拡張機能の投稿ボタンが見つからないため、WPコピーに切り替えました');
        btn.click();
        return false;
      }
      copyBodyOnly();
      return false;
    }

    function waitForWpBatchResult() {
      clearWpBatchTimer();
      wpBatchTimer = window.setTimeout(() => {
        wpBatchPosting = false;
        showToast('⚠️ WordPressから応答がないため、まとめ投稿を停止しました');
        updateWpBatchPanel();
      }, WP_BATCH_TIMEOUT_MS);
    }

    document.documentElement.addEventListener('mailcopy-wp-post-result', () => {
      if (!isWpBatchActive() || !wpBatchPosting) return;

      clearWpBatchTimer();
      wpBatchPosting = false;

      let result;
      try {
        result = JSON.parse(document.documentElement.getAttribute('data-mailcopy-wp-post-result') || '{}');
      } catch (error) {
        result = { success: false, error: '投稿結果を読み取れませんでした' };
      }

      if (!result.success) {
        showToast(`❌ ${wpBatchIndex + 1}件目で停止: ${result.error || '投稿に失敗しました'}`);
        updateWpBatchPanel();
        return;
      }

      showToast(`✅ ${wpBatchIndex + 1}/${wpBatchQueue.length}件の投稿が完了しました`);
      window.setTimeout(() => advanceWpBatch(), 400);
    });

    async function startWpBatch() {
      if (getSelectedDraftCount() === 0) {
        showToast('⚠️ 先に下書きを選択してください');
        return;
      }

      if (editMode === 'draft') {
        await autoSave();
      }

      const selectedIds = Array.from(selectedDraftIds).map(id => parseInt(id, 10)).filter(Number.isFinite);
      const drafts = (await db.drafts.bulkGet(selectedIds)).filter(Boolean);
      if (drafts.length === 0) {
        showToast('⚠️ 選択した下書きが見つかりませんでした');
        clearSelectedDrafts();
        return;
      }

      sortByCreatedAtOldestFirst(drafts);
      wpBatchQueue = drafts.map(draft => draft.id);
      wpBatchIndex = -1;
      isWpBatchSelectionMode = false;
      updateWpBatchSelectionModeUI();
      await advanceWpBatch();
    }

    async function advanceWpBatch(isManualAdvance = false) {
      if (wpBatchPosting) {
        showToast('⏳ 現在の投稿完了を待っています');
        return;
      }

      clearWpBatchTimer();

      if (wpBatchQueue.length === 0) {
        showToast('⚠️ まとめ投稿の対象がありません');
        updateWpBatchPanel();
        return;
      }

      const nextIndex = wpBatchIndex + 1;
      if (nextIndex >= wpBatchQueue.length) {
        showToast('✅ 選択した下書きのWordPress投稿が完了しました');
        cancelWpBatch(false);
        return;
      }

      wpBatchIndex = nextIndex;
      const draftId = wpBatchQueue[wpBatchIndex];
      const draft = await db.drafts.get(draftId);
      if (!draft) {
        selectedDraftIds.delete(String(draftId));
        await advanceWpBatch();
        return;
      }

      await loadDraft(draftId);
      await new Promise(resolve => window.setTimeout(resolve, 60));
      wpBatchPosting = true;
      const started = triggerWpPostAction();
      if (!started) {
        wpBatchPosting = false;
        updateWpBatchPanel();
        return;
      }
      waitForWpBatchResult();
      updateWpBatchPanel();
      showToast(`${isManualAdvance ? '⏭️' : '🚀'} ${wpBatchIndex + 1}/${wpBatchQueue.length}件目の投稿を開始しました`);
    }

    function cancelWpBatch(keepSelection = true) {
      clearWpBatchTimer();
      wpBatchPosting = false;
      document.documentElement.removeAttribute('data-mailcopy-wp-batch');
      document.documentElement.removeAttribute('data-mailcopy-wp-post-result');
      wpBatchQueue = [];
      wpBatchIndex = -1;
      if (!keepSelection) {
        selectedDraftIds.clear();
        updateSelectedDraftCountUI();
      }
      updateWpBatchPanel();
      if (activeTab === 'drafts') {
        loadDraftList();
      }
    }

    async function recopyCurrentWpBatchItem() {
      if (!isWpBatchActive()) {
        showToast('⚠️ まとめWPは開始されていません');
        return;
      }

      if (wpBatchPosting) {
        showToast('⏳ 現在の投稿完了を待っています');
        return;
      }

      const draftId = wpBatchQueue[wpBatchIndex];
      const draft = await db.drafts.get(draftId);
      if (!draft) {
        showToast('⚠️ 現在の下書きが見つかりません');
        return;
      }

      wpBatchPosting = true;
      const started = triggerWpPostAction();
      if (!started) {
        wpBatchPosting = false;
        return;
      }
      waitForWpBatchResult();
      showToast('🚀 今の下書きをもう一度投稿しています');
    }

    async function downloadAllDraftsAsZip() {
      if(!confirm('すべての下書きをzipファイルでダウンロードしますか？')) return;

      const drafts = await db.drafts.orderBy('sortDate').reverse().toArray();
      if(drafts.length === 0) {
        showToast('⚠️ 保存する下書きがありません');
        return;
      }

      const zip = new JSZip();
      const usedNames = {};

      drafts.forEach(d => {
        let filename = (d.subject || '無題').replace(/[\\/:*?"<>|]/g, '_');
        if (usedNames[filename]) {
          usedNames[filename]++;
          filename = `${filename}(${usedNames[filename]})`;
        } else {
          usedNames[filename] = 1;
        }
        const bodyText = stripHtml(d.content);
        const targetDate = d.createdAt || d.sortDate;
        const dateStr = formatDate(targetDate);
        
        const fileContent = `件名: ${d.subject}\n日付: ${dateStr}\n\n${bodyText}`;
        zip.file(`${filename}.txt`, fileContent);
      });

      zip.generateAsync({type:"blob"}).then(function(content) {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(content);
        a.download = `メルマガバックアップ_${new Date().toLocaleDateString().replace(/\//g,'-')}.zip`;
        a.click();
        showToast('📦 zip作成完了！');
      });
    }

    function getBackupTimestamp() {
      return new Date().toISOString().replace('T', '_').replace(/[:.]/g, '-').slice(0, 19);
    }

    async function collectBackupData() {
      const drafts = await db.drafts.toArray();
      const folders = await db.folders.toArray();
      const headers = await db.headers.toArray();
      const footers = await db.footers.toArray();
      const snippets = await db.snippets.toArray();
      const theme = localStorage.getItem('editor-theme') || 'pink';
      const fontSize = localStorage.getItem('editor-font-size') || '16px';

      return { version: '3.0', date: new Date().toISOString(), theme, fontSize, drafts, folders, headers, footers, snippets };
    }

    function downloadBackupJson(data, filename) {
      const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    // データ移行
    async function exportData() {
      if(!confirm('全データをファイルとして保存しますか？')) return;
      const data = await collectBackupData();
      downloadBackupJson(data, `mailcopy_backup_${getBackupTimestamp()}.json`);
      showToast('📤 バックアップ完了');
    }

    async function importData(input) {
      const file = input.files[0];
      if(!file) return;
      if(!confirm('⚠️ 現在のデータは全て上書きされます！よろしいですか？')) {
        input.value = ''; return;
      }
      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          const data = JSON.parse(e.target.result);
          await db.transaction('rw', db.drafts, db.folders, db.headers, db.footers, db.snippets, async () => {
            await db.drafts.clear(); await db.folders.clear(); await db.headers.clear(); await db.footers.clear(); await db.snippets.clear();
            if(data.drafts) await db.drafts.bulkAdd(data.drafts);
            if(data.folders) await db.folders.bulkAdd(data.folders);
            if(data.headers) await db.headers.bulkAdd(data.headers);
            if(data.footers) await db.footers.bulkAdd(data.footers);
            if(data.snippets) await db.snippets.bulkAdd(data.snippets);
          });
          await ensureDefaultFolder();
          if(data.theme) setTheme(data.theme);
          if(data.fontSize) changeBaseFontSize(data.fontSize);
          
          showToast('✅ 復元完了！');
          setTimeout(() => location.reload(), 1000);
        } catch(err) {
          alert('読み込み失敗');
        }
      };
      reader.readAsText(file);
    }

    // --- トリガー設定 (入力検知) ---
    const triggerSave = () => {
      clearTimeout(autoSaveTimer);
      updateHeaderStatus('✍️ 執筆中...');
      autoSaveTimer = setTimeout(autoSave, 1000);
    };

    function updateCharCount() {
      const text = quill.getText();
      const cleanText = text.replace(/\s/g, ''); 
      const count = cleanText.length;
      
      const countEl = document.getElementById('char-count');
      if(countEl) countEl.textContent = `${count}文字`;
    }

    quill.on('text-change', function(delta, oldDelta, source) {
      updateCharCount();
      if (source === 'user') triggerSave();
    });
    
    document.getElementById('input-subject').addEventListener('input', triggerSave);
    document.getElementById('input-hf-name').addEventListener('input', triggerSave);
    const onDraftDateInput = function() {
      if (editMode === 'draft') triggerSave();
    };
    document.getElementById('input-draft-date').addEventListener('input', onDraftDateInput);
    document.getElementById('input-draft-date').addEventListener('change', onDraftDateInput);
    document.getElementById('search-input').addEventListener('input', loadDraftList);
    document.getElementById('select-folder-manager').addEventListener('change', function() {
      const nextValue = parseInt(this.value);
      if (Number.isNaN(nextValue)) return;
      currentDraftFolderId = nextValue;
      document.getElementById('select-draft-folder').value = nextValue;
      if (activeTab === 'settings') loadSettingsList();
    });
    document.getElementById('select-draft-folder').addEventListener('change', function() {
      const nextValue = parseInt(this.value);
      currentDraftFolderId = nextValue;
      if (editMode === 'draft') triggerSave();
    });
    
    document.getElementById('select-header').addEventListener('change', updateHFCache);
    document.getElementById('select-footer').addEventListener('change', updateHFCache);

    function shouldUseMobileImageResizePrompt() {
      const userAgentMobile = navigator.userAgentData?.mobile
        ?? /Android|iPhone|iPod|Mobile/i.test(navigator.userAgent);
      const touchOnlyNarrowScreen = window.matchMedia('(pointer: coarse)').matches
        && window.innerWidth < 768;
      return userAgentMobile || touchOnlyNarrowScreen;
    }

    document.getElementById('editor').addEventListener('click', function(e) {
      if (!shouldUseMobileImageResizePrompt()) return;
      if (e.target.tagName === 'IMG') {
        if(!confirm('画像のサイズを変更しますか？')) return;
        const currentW = e.target.getAttribute('width') || e.target.style.width || '100%';
        const newWidth = prompt('幅を指定してください\n(例: 100%, 300, 500px)', currentW);
        if (newWidth) {
          e.target.setAttribute('width', newWidth); 
          e.target.style.width = newWidth;
          if(!isNaN(newWidth)) {
             e.target.style.width = newWidth + 'px';
          }
          triggerSave(); 
          showToast('🖼️ サイズを変更しました');
        }
      }
    });

    // ▼▼▼ 機能: 検索と置換 & AI整形 ▼▼▼
    
    function toggleSearchModal() {
        const modal = document.getElementById('search-modal');
        modal.classList.toggle('hidden');
        if(!modal.classList.contains('hidden')) {
            // モーダルを開いたときに設定をロード
            loadAiCleanupConfig();
            document.getElementById('search-term').focus();
            // Reset pending states
            resetModalActionStates();
        }
    }

    // ★追加★ モーダル内のボタン状態リセット
    function resetModalActionStates() {
        aiCleanupPending = false;
        manualReplacePending = false;

        // AIボタンリセット
        const aiBtn = document.getElementById('btn-ai-execute');
        if(aiBtn) {
            aiBtn.innerHTML = '🧹 実行する';
            aiBtn.className = "w-full bg-[var(--theme-main)] hover:bg-[var(--theme-hover)] text-white font-bold py-2 px-4 rounded-lg shadow transition transform active:scale-95 text-sm flex items-center justify-center gap-2";
        }

        // 手動置換ボタンリセット
        const manualBtn = document.getElementById('btn-manual-replace');
        if(manualBtn) {
            manualBtn.innerHTML = 'すべて置換';
            manualBtn.className = "bg-[var(--theme-main)] text-white font-bold py-1.5 px-4 rounded-lg shadow hover:opacity-90 transition transform active:scale-95 text-sm";
        }
    }
    
    // 正規表現のエスケープ用
    function escapeRegExp(string) {
      return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); 
    }

    // ★ Delta直接操作版の手動置換 (インデックスズレ防止)
    function executeReplace(searchTerm, replaceTerm, checkSubject) {
        if (!searchTerm) return 0;

        let replaceCount = 0;

        // 1. 件名の置換 (DOM操作)
        if (checkSubject && editMode === 'draft') {
            const subjInput = document.getElementById('input-subject');
            if (subjInput.value.includes(searchTerm)) {
                const regex = new RegExp(escapeRegExp(searchTerm), 'g');
                const matches = subjInput.value.match(regex);
                if(matches) replaceCount += matches.length;
                
                subjInput.value = subjInput.value.replaceAll(searchTerm, replaceTerm);
                triggerSave();
            }
        }

        // 2. 本文の置換 (Delta操作)
        const delta = quill.getContents();
        const regex = new RegExp(escapeRegExp(searchTerm), 'g');
        let bodyReplaceCount = 0;

        delta.ops.forEach(op => {
            if (typeof op.insert === 'string') {
                const original = op.insert;
                // 一括置換
                const replaced = original.replaceAll(searchTerm, replaceTerm);
                
                if (original !== replaced) {
                    // 出現回数をカウント (簡易的)
                    const matches = original.match(regex);
                    if(matches) bodyReplaceCount += matches.length;
                    
                    op.insert = replaced;
                }
            }
        });

        if (bodyReplaceCount > 0) {
            quill.setContents(delta, Quill.sources.USER);
            triggerSave();
            replaceCount += bodyReplaceCount;
        }

        return replaceCount;
    }

    // 手動置換ボタン (ダブルクリック確認方式)
    function performManualReplace() {
        const searchTerm = document.getElementById('search-term').value;
        // 入力チェック (未入力なら何もしない)
        if (!searchTerm) {
            showToast('⚠️ 検索する文字を入力してください');
            return;
        }

        const btn = document.getElementById('btn-manual-replace');

        // 1回目クリック: 確認モードへ
        if (!manualReplacePending) {
            manualReplacePending = true;
            btn.innerHTML = '⚠️ 確定';
            // 確認時は赤色になど変更
            btn.classList.remove('bg-[var(--theme-main)]');
            btn.classList.add('bg-red-500');
            return;
        }

        // 2回目クリック: 実行
        const replaceTerm = document.getElementById('replace-term').value;
        const checkSubject = document.getElementById('check-subject').checked;

        const count = executeReplace(searchTerm, replaceTerm, checkSubject);
        if (count > 0) {
            showToast(`✅ ${count}箇所を置換しました`);
            toggleSearchModal(); // 成功したら閉じる (リセットもされる)
        } else {
            showToast('⚠️ 対象の文字が見つかりませんでした');
            resetModalActionStates(); // 見つからなかったらリセットして留まる
        }
    }

    // ★追加★ AI整形（一括削除） - Delta直接操作版
    // ユーザー選択対応 + 設定保存 + ダブルクリック確認方式
    function performAiCleanup() {
       let targets = "";
       if (document.getElementById('ai-target-full-quote').checked) targets += "“”";
       if (document.getElementById('ai-target-half-quote').checked) targets += "\"";
       if (document.getElementById('ai-target-space').checked) targets += " ";
       if (document.getElementById('ai-target-brackets').checked) targets += "「」";
       if (document.getElementById('ai-target-asterisk').checked) targets += "*";

       if (!targets) {
           showToast('⚠️ 削除する記号を選択してください');
           return;
       }

       const btn = document.getElementById('btn-ai-execute');

       // 1回目クリック: 確認モードへ
       if (!aiCleanupPending) {
           aiCleanupPending = true;
           btn.innerHTML = '⚠️ もう一度押して実行';
           // 確認時は赤色になど変更
           btn.classList.remove('bg-[var(--theme-main)]', 'hover:bg-[var(--theme-hover)]');
           btn.classList.add('bg-red-500', 'hover:bg-red-600');
           return;
       }

       // 2回目クリック: 実行
       // if(!confirm(...)) return; // 削除

       const delta = quill.getContents();
       // 削除対象を正規表現の文字クラス [] に変換
       const escapedTargets = targets.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
       const regex = new RegExp(`[${escapedTargets}]`, 'g'); 
       
       let matchCount = 0;

       // Deltaの各Opを走査して文字を置換
       delta.ops.forEach(op => {
         if (typeof op.insert === 'string') {
           const original = op.insert;
           const replaced = original.replace(regex, '');
           if (original !== replaced) {
             matchCount += (original.length - replaced.length); // 削除された文字数
             op.insert = replaced;
           }
         }
       });

       if (matchCount > 0) {
           quill.setContents(delta, Quill.sources.USER); // 履歴に残す
           triggerSave(); // 保存トリガー
           showToast(`🧹 合計 ${matchCount}文字を削除しました`);
           toggleSearchModal(); // 成功したら閉じる
       } else {
           showToast('✅ 対象の記号は見つかりませんでした');
           resetModalActionStates(); // リセット
       }
    }

    // ★追加★ 設定保存機能
    function saveAiCleanupConfig() {
      const config = {
        fullQuote: document.getElementById('ai-target-full-quote').checked,
        halfQuote: document.getElementById('ai-target-half-quote').checked,
        space: document.getElementById('ai-target-space').checked,
        brackets: document.getElementById('ai-target-brackets').checked,
        asterisk: document.getElementById('ai-target-asterisk').checked
      };
      localStorage.setItem('mail_helper_ai_config', JSON.stringify(config));
    }

    function loadAiCleanupConfig() {
      const configStr = localStorage.getItem('mail_helper_ai_config');
      if (configStr) {
        const config = JSON.parse(configStr);
        if(config.fullQuote !== undefined) document.getElementById('ai-target-full-quote').checked = config.fullQuote;
        if(config.halfQuote !== undefined) document.getElementById('ai-target-half-quote').checked = config.halfQuote;
        if(config.space !== undefined) document.getElementById('ai-target-space').checked = config.space;
        if(config.brackets !== undefined) document.getElementById('ai-target-brackets').checked = config.brackets;
        if(config.asterisk !== undefined) document.getElementById('ai-target-asterisk').checked = config.asterisk;
      }
    }

    // ▲▲▲ ここまで追加機能 ▲▲▲

    // 初期ロード
    (async function initializeApp() {
      await ensureDefaultFolder();
      await loadFolderDropdowns();
      setDraftDateValue(new Date().toISOString());
      lastSavedSnapshot.draftDate = getDraftDateIso();
      updateSelectedDraftCountUI();
      updateWpBatchPanel();
      await switchTab('drafts');
      loadAiCleanupConfig();
    })();
  </script>
