<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>MailCopy Helper</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📩</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/quill-image-resize-module@3.0.0/image-resize.min.js"></script>
    
  <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
  <style>
    /* ▼▼▼ テーマカラー変数定義 ▼▼▼ */
    :root {
      /* 元のくっきりした色に戻しました */
      --theme-main: #16a34a;  /* main */
      --theme-soft: #ecfdf5;  /* soft */
      --theme-border: #86efac; /* border */
      --theme-hover: #15803d; /* hover */
      
      --base-font-size: 16px; /* 基本フォントサイズ */
    }

    body { font-family: 'M PLUS Rounded 1c', sans-serif; }
    
    #editor { 
      height: 60vh; 
      font-family: 'M PLUS Rounded 1c', sans-serif;
    }
    
    /* エディタ内のフォントサイズ適用 */
    #editor .ql-editor {
      font-size: var(--base-font-size);
      line-height: 1.8;
    }
    #editor .ql-editor a {
      color: #2563eb !important;
      text-decoration: underline !important;
    }
    
    /* ツールバー */
    .ql-toolbar.ql-snow {
      border: none;
      background-color: #fff;
      border-bottom: 2px solid var(--theme-soft);
      border-radius: 12px 12px 0 0;
      padding: 8px;
    }
    .ql-container.ql-snow {
      border: none;
      background-color: white;
      border-radius: 0 0 12px 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }

    /* Undo/Redoアイコンの調整 */
    .ql-snow .ql-picker.ql-size { width: 110px; }
    .ql-undo, .ql-redo { outline: none; }
    .ql-undo:hover svg, .ql-redo:hover svg { stroke: var(--theme-main) !important; }

    /* リストアイテム */
    .nav-item { 
      @apply p-3 mb-2 rounded-lg cursor-pointer transition border-l-4 border-transparent hover:bg-[var(--theme-soft)] relative flex justify-between items-center group; 
      border-bottom: 1px solid var(--theme-soft);
    }
    .nav-item.selected { 
      background-color: var(--theme-soft);
      border-left-color: var(--theme-main);
      font-weight: bold;
    }

    /* 定型文リスト用 */
    .snippet-item {
      @apply p-2 mb-2 rounded-lg cursor-pointer transition border border-gray-100 hover:bg-[var(--theme-soft)] hover:border-[var(--theme-border)] relative flex justify-between items-center group;
      background-color: #fff;
    }
    .snippet-item.selected {
      background-color: var(--theme-soft);
      border-left: 4px solid var(--theme-main);
    }
    /* ドラッグ中のスタイル */
    .snippet-item.dragging {
      opacity: 0.5;
      background-color: #f3f4f6; /* gray-100 */
      border: 2px dashed #d1d5db; /* gray-300 */
    }

    .folder-sort-list {
      @apply flex flex-col gap-2;
    }
    .folder-sort-item {
      @apply gap-2;
    }
    .folder-sort-item.dragging {
      opacity: 0.5;
      background-color: #f3f4f6;
      border: 2px dashed #d1d5db;
    }
    .folder-sort-item.locked-folder {
      cursor: pointer;
    }
    .folder-sort-handle {
      @apply shrink-0 select-none text-lg leading-none px-2;
      width: 2.25rem;
      color: #d1d5db;
      cursor: grab;
      text-align: center;
    }
    .folder-sort-item.locked-folder .folder-sort-handle {
      cursor: default;
      opacity: 0;
    }

    .settings-folder-item {
      background-color: #fff;
      align-items: center;
      margin-bottom: 0;
      padding-top: 0.875rem;
      padding-bottom: 0.875rem;
    }
    .settings-list-section {
      background-color: #fff;
      border: 1px solid #f3e8ef;
      border-radius: 1rem;
      padding: 0.875rem;
      margin-bottom: 1rem;
    }
    .settings-list-section:last-child {
      margin-bottom: 0;
    }
    .settings-list-title {
      display: block;
      margin-bottom: 0.75rem;
    }
    .settings-list-items {
      @apply flex flex-col gap-2;
      position: relative;
    }
    .settings-list-items .nav-item {
      margin-bottom: 0;
    }
    .settings-hf-item {
      margin-bottom: 0;
      background-color: #fff;
    }
    .settings-list-section .settings-list-items:last-child {
      padding-bottom: 0.125rem;
    }

    /* 年月セパレーター */
    .year-group-header {
      @apply flex items-center justify-between text-sm font-bold mt-3 mb-1 pl-2 pr-2 py-1;
      color: var(--theme-main);
      overflow: hidden;
      position: relative;
      isolation: isolate;
      contain: paint;
    }
    .year-group-header.collapsed {
      opacity: 0.85;
    }

    .month-header {
      @apply text-xs font-bold text-gray-400 mt-4 mb-2 pl-2 border-b border-gray-100 pb-1;
    }

    .folder-group-header {
      @apply flex items-center justify-between px-3 py-2 rounded-xl border text-sm font-bold;
      background: linear-gradient(135deg, rgba(255,255,255,0.95), var(--theme-soft));
      border-color: var(--theme-border);
      color: var(--theme-main);
      overflow: hidden;
      position: relative;
      isolation: isolate;
      contain: paint;
    }
    .folder-group-header.collapsed {
      opacity: 0.9;
    }
    .draft-batch-selected {
      box-shadow: inset 0 0 0 1px var(--theme-border);
      background-color: #fff;
    }

    .default-folder-header {
      @apply flex items-center justify-between mt-3 mb-1 px-1 py-1 text-sm font-bold;
      color: var(--theme-main);
      background: transparent;
      border: none;
      border-radius: 0;
      box-shadow: none;
    }
    
    /* トースト通知 */
    #toast-container {
      position: fixed;
      bottom: 80px; 
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background-color: rgba(50, 50, 50, 0.95);
      color: white;
      padding: 12px 30px;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: bold;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 9999;
    }
    #toast-container.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* カスタムスクロールバー */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: var(--theme-border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--theme-main); }
    
    /* タブのアクティブスタイル */
    .tab-active {
      color: var(--theme-main);
      border-bottom-width: 2px;
      border-bottom-color: var(--theme-main);
      background-color: var(--theme-soft);
    }
    .tab-inactive {
      color: #9ca3af; /* gray-400 */
    }
    .tab-inactive:hover {
      color: var(--theme-main);
      background-color: var(--theme-soft);
    }

    /* モバイル用メニュー制御 */
    .sidebar-open { transform: translateX(0) !important; }
    .overlay-open { display: block !important; }

    @media (max-width: 767px) {
      #app-header {
        padding-top: max(0.5rem, env(safe-area-inset-top));
        padding-right: max(0.5rem, env(safe-area-inset-right));
        padding-left: max(0.5rem, env(safe-area-inset-left));
      }

      #mobile-menu-button {
        display: flex;
        width: 2.5rem;
        height: 2.5rem;
        flex: 0 0 2.5rem;
        align-items: center;
        justify-content: center;
        overflow: visible;
        line-height: 1;
      }

      #app-title {
        min-width: 0;
        font-size: 0.95rem;
      }

      #theme-buttons {
        gap: 0.2rem;
      }
    }

    @media (min-width: 768px) {
      #left-sidebar {
        transform: none !important;
        transition: none !important;
      }
    }

    /* モーダル用 */
    .modal-backdrop {
      background-color: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(2px);
    }
  </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col text-gray-700 overflow-hidden">

  <div id="toast-container">通知メッセージ</div>
  <input type="file" id="import-file" style="display: none;" accept=".json" onchange="importData(this)">

  <!-- ▼▼▼ 検索置換・AI整形モーダル (テーマカラー対応) ▼▼▼ -->
  <div id="search-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center modal-backdrop p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all flex flex-col max-h-[90vh]">
      <div class="bg-[var(--theme-soft)] p-3 border-b border-[var(--theme-border)] flex justify-between items-center shrink-0">
        <h3 class="font-bold text-[var(--theme-main)] flex items-center gap-2">
          🔍 検索と置換
        </h3>
        <button onclick="toggleSearchModal()" class="text-gray-400 hover:text-gray-600 font-bold text-xl px-2">✕</button>
      </div>
      
      <div class="overflow-y-auto p-4 space-y-4">
        <!-- AI整形エリア -->
        <div class="bg-[var(--theme-soft)] border border-[var(--theme-border)] rounded-xl p-3">
            <h4 class="text-xs font-bold text-[var(--theme-main)] mb-2 uppercase tracking-wider flex items-center gap-1">
              🤖 AI整形 <span class="text-[10px] font-normal text-gray-500">(選択した記号を一括削除)</span>
            </h4>
            
            <div class="text-xs text-gray-600 mb-3 grid grid-cols-2 gap-2">
                <label class="flex items-center space-x-2 cursor-pointer bg-white p-1.5 rounded border border-[var(--theme-border)] hover:bg-gray-50 transition">
                    <input type="checkbox" id="ai-target-full-quote" checked onchange="saveAiCleanupConfig()" class="form-checkbox text-[var(--theme-main)] rounded focus:ring-[var(--theme-border)] h-4 w-4">
                    <span>全角 “ ”</span>
                </label>
                <label class="flex items-center space-x-2 cursor-pointer bg-white p-1.5 rounded border border-[var(--theme-border)] hover:bg-gray-50 transition">
                    <input type="checkbox" id="ai-target-half-quote" checked onchange="saveAiCleanupConfig()" class="form-checkbox text-[var(--theme-main)] rounded focus:ring-[var(--theme-border)] h-4 w-4">
                    <span>半角 "</span>
                </label>
                <label class="flex items-center space-x-2 cursor-pointer bg-white p-1.5 rounded border border-[var(--theme-border)] hover:bg-gray-50 transition">
                    <input type="checkbox" id="ai-target-space" checked onchange="saveAiCleanupConfig()" class="form-checkbox text-[var(--theme-main)] rounded focus:ring-[var(--theme-border)] h-4 w-4">
                    <span>半角スペース</span>
                </label>
                <label class="flex items-center space-x-2 cursor-pointer bg-white p-1.5 rounded border border-[var(--theme-border)] hover:bg-gray-50 transition">
                    <input type="checkbox" id="ai-target-brackets" checked onchange="saveAiCleanupConfig()" class="form-checkbox text-[var(--theme-main)] rounded focus:ring-[var(--theme-border)] h-4 w-4">
                    <span>カギカッコ 「」</span>
                </label>
                <label class="flex items-center space-x-2 cursor-pointer bg-white p-1.5 rounded border border-[var(--theme-border)] hover:bg-gray-50 transition col-span-2">
                    <input type="checkbox" id="ai-target-asterisk" checked onchange="saveAiCleanupConfig()" class="form-checkbox text-[var(--theme-main)] rounded focus:ring-[var(--theme-border)] h-4 w-4">
                    <span>アスタリスク *</span>
                </label>
            </div>
            <!-- ★変更★: ID追加, 2回押しで実行 -->
            <button id="btn-ai-execute" onclick="performAiCleanup()" class="w-full bg-[var(--theme-main)] hover:bg-[var(--theme-hover)] text-white font-bold py-2 px-4 rounded-lg shadow transition transform active:scale-95 text-sm flex items-center justify-center gap-2">
               🧹 実行する
            </button>
        </div>

        <div class="border-t border-gray-100"></div>

        <!-- 通常の検索置換 -->
        <div class="space-y-3">
          <div class="flex items-center gap-2">
            <div class="flex-1">
              <label class="block text-[10px] font-bold text-gray-400 mb-1">検索する文字</label>
              <input type="text" id="search-term" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm focus:border-[var(--theme-main)] outline-none" placeholder="例: “">
            </div>
            <div class="text-gray-300 text-lg pt-4">⮕</div>
            <div class="flex-1">
              <label class="block text-[10px] font-bold text-gray-400 mb-1">置換後 (空欄で削除)</label>
              <input type="text" id="replace-term" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm focus:border-[var(--theme-main)] outline-none" placeholder="">
            </div>
          </div>
          
          <div class="flex items-center justify-between">
             <div class="flex items-center gap-2">
               <input type="checkbox" id="check-subject" class="w-4 h-4 text-[var(--theme-main)] rounded focus:ring-[var(--theme-main)]">
               <label for="check-subject" class="text-xs font-bold text-gray-500 cursor-pointer">件名も対象にする</label>
             </div>
             <!-- ★変更★: ID追加, 2回押しで実行 -->
             <button id="btn-manual-replace" onclick="performManualReplace()" class="bg-[var(--theme-main)] text-white font-bold py-1.5 px-4 rounded-lg shadow hover:opacity-90 transition transform active:scale-95 text-sm">
               すべて置換
             </button>
          </div>
        </div>
      </div>

      <div class="p-3 bg-gray-50 border-t border-gray-100 flex justify-center shrink-0">
        <button onclick="toggleSearchModal()" class="text-gray-400 font-bold text-xs hover:text-gray-600 transition underline">閉じる</button>
      </div>
    </div>
  </div>
  <!-- ▲▲▲ 検索置換モーダル ▲▲▲ -->

  <header id="app-header" class="bg-white/80 backdrop-blur-md shadow-sm p-3 md:p-4 flex justify-between items-center z-20 border-b border-[var(--theme-border)] transition-colors duration-300">
    <div class="flex min-w-0 items-center gap-2 md:gap-4 overflow-hidden flex-1">
      <button id="mobile-menu-button" onclick="toggleSidebar()" class="md:hidden text-[var(--theme-main)] shrink-0" aria-label="メニューを開く">
        <svg class="h-7 w-7" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.4" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
      </button>
      
      <h1 id="app-title" class="text-lg md:text-xl font-bold text-[var(--theme-main)] flex min-w-0 items-center gap-1 md:gap-2 truncate">
        📩 <span class="hidden md:inline">MailCopy Helper</span> <span class="md:hidden truncate">MailCopy</span>
      </h1>
      <div id="status-msg" class="text-xs md:text-sm font-bold text-[var(--theme-main)] transition-opacity duration-700 opacity-0 ml-1 whitespace-nowrap"></div>
      
      <div id="char-count" class="ml-auto mr-2 text-xs md:text-sm font-bold text-gray-500 bg-gray-100 px-2 py-1 rounded-full whitespace-nowrap">
        0文字
      </div>
    </div>
    
    <div id="theme-buttons" class="flex gap-1 md:gap-2 shrink-0">
      <button onclick="setTheme('pink')" class="w-5 h-5 md:w-6 md:h-6 rounded-full bg-pink-500 border-2 border-white shadow hover:scale-110 transition"></button>
      <button onclick="setTheme('blue')" class="w-5 h-5 md:w-6 md:h-6 rounded-full bg-blue-500 border-2 border-white shadow hover:scale-110 transition"></button>
      <button onclick="setTheme('green')" class="w-5 h-5 md:w-6 md:h-6 rounded-full bg-green-600 border-2 border-white shadow hover:scale-110 transition"></button>
      <button onclick="setTheme('black')" class="w-5 h-5 md:w-6 md:h-6 rounded-full bg-gray-800 border-2 border-white shadow hover:scale-110 transition"></button>
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden relative">
    
    <div id="mobile-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden transition-opacity"></div>

    <aside id="left-sidebar" class="fixed md:relative inset-y-0 left-0 z-40 w-4/5 md:w-1/3 max-w-sm bg-white border-r border-[var(--theme-border)] flex flex-col shadow-2xl md:shadow-[4px_0_24px_rgba(0,0,0,0.02)] transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out">
      <div class="flex border-b border-[var(--theme-border)]">
        <button id="tab-drafts" onclick="switchTab('drafts')" class="flex-1 py-3 text-center font-bold transition duration-300 text-sm md:text-base">
          📝 下書き
        </button>
        <button id="tab-snippets" onclick="switchTab('snippets')" class="flex-1 py-3 text-center font-bold transition duration-300 text-sm md:text-base">
          📌 定型文
        </button>
        <button id="tab-settings" onclick="switchTab('settings')" class="flex-1 py-3 text-center font-bold transition duration-300 text-sm md:text-base">
          ⚙️ 設定
        </button>
        <button onclick="toggleSidebar()" class="md:hidden px-4 text-gray-400">✕</button>
      </div>

      <!-- 下書きタブのコントロール -->
      <div id="ctrl-drafts" class="p-4 border-b border-[var(--theme-border)] bg-white space-y-3">
        <div class="relative">
          <input type="text" id="search-input" placeholder="🔍 検索... 例: 件名 / 本文 / 2026年 / 2026年6月" 
            class="w-full bg-gray-100 border-none rounded-full py-2 px-4 text-sm focus:ring-2 focus:ring-[var(--theme-border)] outline-none transition">
        </div>

        <div class="flex gap-2">
            <button onclick="createNew()" class="flex-1 bg-white border-2 border-[var(--theme-main)] text-[var(--theme-main)] hover:bg-[var(--theme-soft)] font-bold py-2 px-2 rounded-xl shadow-sm transition transform hover:-translate-y-0.5 text-sm">
            ＋ 新規
            </button>
            <!-- ★変更★: テーマカラーを適用 -->
            <button onclick="toggleSearchModal()" class="flex-1 bg-white border-2 border-[var(--theme-main)] text-[var(--theme-main)] hover:bg-[var(--theme-soft)] font-bold py-2 px-2 rounded-xl shadow-sm transition transform hover:-translate-y-0.5 text-sm flex justify-center items-center gap-1">
            🔍 置換・整形
            </button>
        </div>

        <button id="btn-toggle-wp-batch-mode" onclick="toggleWpBatchSelectionMode()" class="w-full bg-white border border-blue-200 text-blue-500 font-bold py-2 px-3 rounded-xl hover:bg-blue-50 transition text-sm">
          ☑️ まとめ投稿する
        </button>

        <div id="wp-batch-selection-controls" class="hidden bg-blue-50/60 p-3 rounded-xl border border-blue-200 space-y-2">
          <div class="flex items-center justify-between gap-2">
            <div id="selected-draft-count" class="text-xs font-bold text-gray-500">0件選択中</div>
            <button onclick="toggleWpBatchSelectionMode(false)" class="text-xs font-bold text-gray-400 hover:text-gray-600 underline">
              選択をやめる
            </button>
          </div>
          <button id="btn-start-wp-batch" onclick="startWpBatch()" class="w-full bg-blue-50 border border-blue-200 text-blue-600 font-bold py-2 px-3 rounded-lg hover:bg-blue-100 transition text-sm">
            選択した下書きを古い順でWordPressに投稿
          </button>
        </div>

        <button onclick="downloadAllDraftsAsZip()" class="w-full bg-white border border-gray-300 text-gray-500 font-bold py-2 px-4 rounded-xl hover:bg-gray-100 transition text-sm flex justify-center items-center gap-2">
          📦 Zip保存
        </button>
        
        <div class="flex gap-2 pt-2 border-t border-dashed border-gray-200">
          <button onclick="exportData()" class="flex-1 bg-gray-50 border border-gray-300 text-gray-500 text-xs font-bold py-2 px-2 rounded-lg hover:bg-gray-100 transition">
            📤 保存
          </button>
          <button onclick="document.getElementById('import-file').click()" class="flex-1 bg-gray-50 border border-gray-300 text-gray-500 text-xs font-bold py-2 px-2 rounded-lg hover:bg-gray-100 transition">
            📥 復元
          </button>
        </div>
      </div>

      <!-- 定型文タブのコントロール -->
      <div id="ctrl-snippets" class="p-4 border-b border-[var(--theme-border)] bg-white hidden space-y-3">
        <p class="text-xs text-gray-500 font-bold text-center">👇 ドラッグで並び替え（最大5つまで登録可能）</p>
        <button onclick="createSnippet()" class="w-full bg-white border-2 border-[var(--theme-main)] text-[var(--theme-main)] hover:bg-[var(--theme-soft)] font-bold py-2 px-4 rounded-xl shadow-sm transition transform hover:-translate-y-0.5 flex justify-center items-center gap-2">
          ＋ 新しい定型文・見出しを作成
        </button>
      </div>

      <!-- 設定タブのコントロール -->
      <div id="ctrl-settings" class="p-4 border-b border-[var(--theme-border)] bg-white hidden flex flex-col gap-4">
        
        <div class="bg-gray-50 p-3 rounded-xl border border-gray-200">
          <label class="block text-xs font-bold text-gray-500 mb-2">🔠 基本文字サイズ (固定)</label>
          <select id="select-font-size" onchange="changeBaseFontSize(this.value)" class="w-full p-2 bg-white border border-gray-300 rounded-lg text-gray-700 font-bold text-sm focus:outline-none focus:border-[var(--theme-main)]">
            <option value="12px">12px (小)</option>
            <option value="14px">14px</option>
            <option value="16px" selected>16px (標準)</option>
            <option value="18px">18px (大)</option>
            <option value="20px">20px (特大)</option>
            <option value="24px">24px</option>
          </select>
        </div>

        <div class="bg-gray-50 p-3 rounded-xl border border-gray-200 space-y-3">
          <label class="block text-xs font-bold text-gray-500">🗂️ フォルダ管理</label>

  <script>
    // --- 0. テーマとフォント管理 ---
    const themes = {
      green: { main: '#16a34a', soft: '#ecfdf5', border: '#86efac', hover: '#15803d' },
      pink: { main: '#ec4899', soft: '#fdf2f8', border: '#fbcfe8', hover: '#db2777' },
      blue: { main: '#3b82f6', soft: '#eff6ff', border: '#bfdbfe', hover: '#2563eb' },
      black: { main: '#111827', soft: '#f3f4f6', border: '#d1d5db', hover: '#374151' }
    };

    function setTheme(name) {
      const t = themes[name];
      const root = document.documentElement;
      root.style.setProperty('--theme-main', t.main);
      root.style.setProperty('--theme-soft', t.soft);
      root.style.setProperty('--theme-border', t.border);
      root.style.setProperty('--theme-hover', t.hover);
      localStorage.setItem('editor-theme', name);
    }

    function changeBaseFontSize(size) {
      document.documentElement.style.setProperty('--base-font-size', size);
      localStorage.setItem('editor-font-size', size);
    }

    // 初期化
    const savedTheme = localStorage.getItem('editor-theme') || 'pink';
    setTheme(savedTheme);

    const savedFontSize = localStorage.getItem('editor-font-size') || '16px';
    document.documentElement.style.setProperty('--base-font-size', savedFontSize);
    document.getElementById('select-font-size').value = savedFontSize;


    // --- 1. 初期設定 ---
    const Size = Quill.import('attributors/style/size');
    Size.whitelist = ['10px', '11px', '12px', '13px', '14px', '16px', '18px', '20px', '24px', '36px', '40px', '48px'];
    Quill.register(Size, true);

    // ★ Undo/Redoアイコン登録
    const icons = Quill.import("ui/icons");
    icons["undo"] = `<svg viewbox="0 0 18 18"><polygon class="ql-fill ql-stroke" points="6 10 4 12 2 10 6 10"></polygon><path class="ql-stroke" d="M8.09,13.91A4.6,4.6,0,0,0,9,14,5,5,0,1,0,4,9"></path></svg>`;
    icons["redo"] = `<svg viewbox="0 0 18 18"><polygon class="ql-fill ql-stroke" points="12 10 14 12 16 10 12 10"></polygon><path class="ql-stroke" d="M9.91,13.91A4.6,4.6,0,0,1,9,14a5,5,0,1,1,5-5"></path></svg>`;

    const DEFAULT_FOLDER_NAME = '随時';
    const LEGACY_DEFAULT_FOLDER_NAME = '未分類';
    const QUICK_SNIPPET_LIMIT = 5;
    const CUSTOM_FOLDER_GROUP_KEY = '__custom_folder_group__';
    const YEAR_GROUP_KEY_PREFIX = '__year_group__::';
    const WP_BATCH_TIMEOUT_MS = 180000;

    // ★ Dexie DB設定: 'snippets' に order を追加
    const db = new Dexie("MailEditorDB");
    db.version(10).stores({ // version up
      drafts: '++id, subject, content, sortDate, updatedAt, createdAt', 
      headers: '++id, name, content, sortDate, updatedAt, createdAt',
      footers: '++id, name, content, sortDate, updatedAt, createdAt',
      snippets: '++id, name, content, order, sortDate, updatedAt, createdAt' // order追加
    });
    db.version(11).stores({
      drafts: '++id, folderId, subject, content, sortDate, updatedAt, createdAt',
      headers: '++id, name, content, sortDate, updatedAt, createdAt',
      footers: '++id, name, content, sortDate, updatedAt, createdAt',
      snippets: '++id, name, content, order, sortDate, updatedAt, createdAt',
      folders: '++id, name, sortDate, updatedAt, createdAt'
    }).upgrade(async tx => {
      const folderTable = tx.table('folders');
      const draftTable = tx.table('drafts');
      const legacyDefaultFolder = await folderTable
        .where('name')
        .equals(LEGACY_DEFAULT_FOLDER_NAME)
        .first();

      if (legacyDefaultFolder) {
        await folderTable.update(legacyDefaultFolder.id, {
          name: DEFAULT_FOLDER_NAME
        });
      }

      let defaultFolderId = await folderTable
        .where('name')
        .equals(DEFAULT_FOLDER_NAME)
        .first()
        .then(folder => folder?.id);

      if (!defaultFolderId) {
        defaultFolderId = await folderTable.add({
          name: DEFAULT_FOLDER_NAME,
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toLocaleString('ja-JP'),
          sortDate: new Date().toISOString()
        });
      }

      await draftTable.toCollection().modify(draft => {
        if (draft.folderId === undefined || draft.folderId === null || draft.folderId === '') {
          draft.folderId = defaultFolderId;
        }
      });
    });
    db.version(12).stores({
      drafts: '++id, folderId, subject, content, sortDate, updatedAt, createdAt',
      headers: '++id, name, content, sortDate, updatedAt, createdAt',
      footers: '++id, name, content, sortDate, updatedAt, createdAt',
      snippets: '++id, name, content, order, sortDate, updatedAt, createdAt',
      folders: '++id, name, order, sortDate, updatedAt, createdAt'
    }).upgrade(async tx => {
      const folderTable = tx.table('folders');
      const folders = await folderTable.toArray();
      const customFolders = folders
        .filter(folder => folder.name !== DEFAULT_FOLDER_NAME)
        .sort((a, b) => (a.name || '').localeCompare(b.name || '', 'ja'));

      for (let i = 0; i < customFolders.length; i += 1) {
        await folderTable.update(customFolders[i].id, {
          order: i + 1
        });
      }
    });

    // --- 2. エディター設定 ---
    function imageHandler() {
      const range = this.quill.getSelection();
      const value = prompt('画像のURLを入力してください:');
      if(value) this.quill.insertEmbed(range.index, 'image', value, Quill.sources.USER);
    }

    function normalizePastedUrl(text) {
      if (!text) return null;
      const trimmed = text.trim();
      if (!trimmed || /\s/.test(trimmed)) return null;

      try {
        const url = new URL(trimmed);
        if (['http:', 'https:', 'mailto:', 'tel:'].includes(url.protocol)) {
          return url.toString();
        }
      } catch (e) {
        if (/^[a-z0-9.-]+\.[a-z]{2,}(\/.*)?$/i.test(trimmed)) {
          return `https://${trimmed}`;
        }
      }

      return null;
    }

    function isImageUrl(urlText) {
      if (!urlText) return false;

      try {
        const url = new URL(urlText);
        const pathname = (url.pathname || '').toLowerCase();
        return /\.(png|jpe?g|gif|webp|svg|bmp|ico|avif|tiff?|heic|heif)$/i.test(pathname);
      } catch (e) {
        return false;
      }
    }

    const quill = new Quill('#editor', {
      theme: 'snow',
      modules: {
        imageResize: { displaySize: true },
        // ★Historyモジュール有効化
        history: { delay: 1000, maxStack: 500, userOnly: true },
        toolbar: {
          container: [
            [{ 'size': Size.whitelist }],
            ['bold', 'italic', 'underline', 'strike'],
            [{ 'color': [] }, { 'background': [] }],
            [{ 'align': [] }, { 'indent': '-1'}, { 'indent': '+1' }],
            [{ 'header': 1 }, { 'header': 2 }, 'blockquote'],
            [{ 'list': 'ordered'}, { 'list': 'bullet' }],
            ['link', 'image', 'clean'],
            ['undo', 'redo'] // ★ツールバーに追加
          ],
          handlers: { 
            'image': imageHandler,
            'undo': function() { this.quill.history.undo(); },
            'redo': function() { this.quill.history.redo(); }
          }
        }
      }
    });

    quill.root.addEventListener('paste', function(e) {
      const range = quill.getSelection(true);
      const pastedText = e.clipboardData?.getData('text/plain') || '';
      const normalizedUrl = normalizePastedUrl(pastedText);
      if (!range || !normalizedUrl) return;

      if (range.length === 0 && isImageUrl(normalizedUrl)) {
        e.preventDefault();
        quill.insertEmbed(range.index, 'image', normalizedUrl, Quill.sources.USER);
        quill.setSelection(range.index + 1, 0, Quill.sources.SILENT);
        showToast('🖼️ 画像を貼り付けました');
        return;
      }

      if (range.length === 0) return;

      e.preventDefault();
      quill.formatText(range.index, range.length, 'link', normalizedUrl, Quill.sources.USER);
      quill.setSelection(range.index + range.length, 0, Quill.sources.SILENT);
      showToast('🔗 選択文字にリンクを設定しました');
    }, true);

    setTimeout(() => {
      const sizeLabels = {
        '10px': '10px', '11px': '11px', '12px': '12px', '13px': '13px', 
        '14px': '14px', '16px': '16px (標準)', '18px': '18px', '20px': '20px',
        '24px': '24px (大)', '36px': '36px', '40px': '40px (特大)', '48px': '48px'
      };
      const picker = document.querySelector('.ql-size .ql-picker-options');
      if(picker) {
        picker.querySelectorAll('span').forEach(span => {
          const val = span.getAttribute('data-value');
          if(sizeLabels[val]) span.textContent = sizeLabels[val];
        });
      }
      const label = document.querySelector('.ql-size .ql-picker-label');
      if(label) label.setAttribute('data-value', '16px');
    }, 500);

    // --- 3. 変数 & 変更検知用Snapshot ---
    let currentId = null;
    let activeTab = 'drafts'; 
    let editMode = 'draft'; // 'draft' | 'header' | 'footer' | 'snippet'
    let currentDraftFolderId = null;
    let isWpBatchSelectionMode = false;
    let selectedDraftIds = new Set();
    let wpBatchQueue = [];
    let wpBatchIndex = -1;
    let wpBatchTimer = null;
    let wpBatchPosting = false;
    let autoSaveTimer = null;
    let deletePending = false; 
    let duplicatePending = false; 
    let isFolderSortDragging = false;
    
    // ★★★ キャッシュ用変数 (ここが重要！) ★★★
    let cachedHeaderContent = '';
    let cachedFooterContent = '';
    
    let lastSavedSnapshot = { subject: '', content: '', name: '', folderId: null, draftDate: '' };
    
    // ★追加★ モーダル内のアクション確認状態
    let aiCleanupPending = false;
    let manualReplacePending = false;

    // --- 4. トースト通知 ---
    function showToast(message) {
      const toast = document.getElementById('toast-container');
      toast.innerHTML = message; // HTMLタグ許可
      toast.classList.add('show');
      if (window.toastTimer) clearTimeout(window.toastTimer);
      window.toastTimer = setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    // --- 7. リスト描画 ---
    function formatDate(isoStr) {
      if(!isoStr) return '';
      const d = new Date(isoStr);
      const year = d.getFullYear();
      const month = d.getMonth() + 1;
      const day = d.getDate();
      const hour = d.getHours().toString().padStart(2, '0');
      const min = d.getMinutes().toString().padStart(2, '0');
      return `${year}/${month}/${day} ${hour}:${min}`;
    }

    function formatYearLabel(isoStr) {
      if(!isoStr) return '';
      const d = new Date(isoStr);
      if (Number.isNaN(d.getTime())) return '';
      return `${d.getFullYear()}年`;
    }

    function formatYearMonthLabel(isoStr) {
      if(!isoStr) return '';
      const d = new Date(isoStr);
      if (Number.isNaN(d.getTime())) return '';
      const year = d.getFullYear();
      const month = d.getMonth() + 1;
      return `${year}年${month}月`;
    }

    function formatMonthLabel(isoStr) {
      if(!isoStr) return '';
      const d = new Date(isoStr);
      if (Number.isNaN(d.getTime())) return '';
      return `${d.getMonth() + 1}月`;
    }

    function getYearKey(isoStr) {
      if(!isoStr) return '';
      const d = new Date(isoStr);
      if (Number.isNaN(d.getTime())) return '';
      return `${d.getFullYear()}`;
    }

    function getYearMonthKey(isoStr) {
      if(!isoStr) return '';
      const d = new Date(isoStr);
      if (Number.isNaN(d.getTime())) return '';
      const year = d.getFullYear();
      const month = (d.getMonth() + 1).toString().padStart(2, '0');
      return `${year}-${month}`;
    }

    function buildDateSearchText(isoStr) {
      if(!isoStr) return '';
      const d = new Date(isoStr);
      if (Number.isNaN(d.getTime())) return '';

      const year = d.getFullYear();
      const month = d.getMonth() + 1;
      const monthPadded = month.toString().padStart(2, '0');

      return [
        `${year}`,
        `${year}年`,
        `${year}/${monthPadded}`,
        `${year}/${month}`,
        `${year}-${monthPadded}`,
        `${year}-${month}`,
        `${year}${monthPadded}`,
        `${year}${month}`,
        `${year}年${month}月`,
        `${year}年${monthPadded}月`
      ].join(' ').toLowerCase().replace(/\s+/g, '');
    }

    function toDatetimeLocalValue(isoStr) {
      if (!isoStr) return '';
      const d = new Date(isoStr);
      if (Number.isNaN(d.getTime())) return '';

      const year = d.getFullYear();
      const month = (d.getMonth() + 1).toString().padStart(2, '0');
      const day = d.getDate().toString().padStart(2, '0');
      const hour = d.getHours().toString().padStart(2, '0');
      const min = d.getMinutes().toString().padStart(2, '0');
      return `${year}-${month}-${day}T${hour}:${min}`;
    }

    function getDraftDateIso() {
      const input = document.getElementById('input-draft-date');
      const value = input?.value;
      if (!value) return new Date().toISOString();

      const draftDate = new Date(value);
      if (Number.isNaN(draftDate.getTime())) {
        return new Date().toISOString();
      }

      return draftDate.toISOString();
    }

    function setDraftDateValue(isoStr) {
      const input = document.getElementById('input-draft-date');
      if (!input) return;
      input.value = toDatetimeLocalValue(isoStr || new Date().toISOString());

        const dateB = b.createdAt || b.sortDate || '';

    function sortByCreatedAtOldestFirst(list) {
      return list.sort((a, b) => {

    function removeDraftFromBatchQueue(id) {
      const key = String(id);
      const currentQueueId = wpBatchQueue[wpBatchIndex];
      wpBatchQueue = wpBatchQueue.filter(queueId => String(queueId) !== key);
      if (wpBatchQueue.length === 0) {
        wpBatchIndex = -1;
      } else if (String(currentQueueId) !== key) {
        wpBatchIndex = wpBatchQueue.findIndex(queueId => String(queueId) === String(currentQueueId));
      } else {
        wpBatchIndex = Math.max(-1, wpBatchIndex - 1);
      }
      updateWpBatchPanel();
    }

    function getFolderOrderValue(folder) {
      const order = Number(folder?.order);
      return Number.isFinite(order) ? order : Number.MAX_SAFE_INTEGER;
    }

    function sortFoldersForDisplay(list) {
      return list.sort((a, b) => {
        if (a.name === DEFAULT_FOLDER_NAME) return 1;
        if (b.name === DEFAULT_FOLDER_NAME) return -1;
        const orderDiff = getFolderOrderValue(a) - getFolderOrderValue(b);
        if (orderDiff !== 0) return orderDiff;
        return (a.name || '').localeCompare(b.name || '', 'ja');
      });
    }

    async function ensureFolderOrders() {
      const folders = await db.folders.toArray();
      const customFolders = folders
        .filter(folder => folder.name !== DEFAULT_FOLDER_NAME)
        .sort((a, b) => {
          const orderDiff = getFolderOrderValue(a) - getFolderOrderValue(b);
          if (orderDiff !== 0) return orderDiff;
          return (a.name || '').localeCompare(b.name || '', 'ja');
        });

      const updates = [];
      customFolders.forEach((folder, index) => {
        const nextOrder = index + 1;
        if (folder.order !== nextOrder) {
          updates.push({ id: folder.id, order: nextOrder });
          folder.order = nextOrder;
        }
      });

      if (updates.length > 0) {
        await db.transaction('rw', db.folders, async () => {
          for (const update of updates) {
            await db.folders.update(update.id, { order: update.order });
          }
        });
      }

      return folders;
    }

    function getCollapsedFolderIds() {
      try {
        const raw = localStorage.getItem('mail_helper_collapsed_folders');
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch (e) {
        return [];
      }
    }

    function setCollapsedFolderIds(ids) {
      localStorage.setItem('mail_helper_collapsed_folders', JSON.stringify(ids));
    }

    function isFolderCollapsed(folder) {
      const collapsedIds = getCollapsedFolderIds();
      return collapsedIds.includes(String(folder.id));
    }

    function isCustomFolderGroupCollapsed() {
      const collapsedIds = getCollapsedFolderIds();
      return collapsedIds.includes(CUSTOM_FOLDER_GROUP_KEY);
    }

    function getYearGroupCollapseKey(folderId, yearKey) {
      return `${YEAR_GROUP_KEY_PREFIX}${folderId}::${yearKey}`;
    }

    function isYearGroupCollapsed(folderId, yearKey) {
      const collapsedIds = getCollapsedFolderIds();
      return collapsedIds.includes(getYearGroupCollapseKey(folderId, yearKey));
    }

    function toggleFolderCollapse(folderId) {
      const collapsedIds = getCollapsedFolderIds();
      const key = String(folderId);
      const nextIds = collapsedIds.includes(key)
        ? collapsedIds.filter(id => id !== key)
        : [...collapsedIds, key];
      setCollapsedFolderIds(nextIds);
      loadDraftList();
    }

    function toggleCustomFolderGroupCollapse() {
      const collapsedIds = getCollapsedFolderIds();
      const nextIds = collapsedIds.includes(CUSTOM_FOLDER_GROUP_KEY)
        ? collapsedIds.filter(id => id !== CUSTOM_FOLDER_GROUP_KEY)
        : [...collapsedIds, CUSTOM_FOLDER_GROUP_KEY];
      setCollapsedFolderIds(nextIds);
      loadDraftList();
    }

    function toggleYearGroupCollapse(folderId, yearKey) {
      const collapsedIds = getCollapsedFolderIds();
      const key = getYearGroupCollapseKey(folderId, yearKey);
      const nextIds = collapsedIds.includes(key)
        ? collapsedIds.filter(id => id !== key)
        : [...collapsedIds, key];
      setCollapsedFolderIds(nextIds);
      loadDraftList();
    }

    function renderDraftFolderSection(listEl, folder, folderDrafts, collapsed, options = {}) {
      const {
        headerMarginClass = 'mt-3',
        headerIndentClass = '',
        itemIndentClass = 'ml-6',
        yearIndentClass = 'ml-3',
        monthIndentClass = 'ml-6',
        emptyClass = 'px-3 py-3 text-xs text-gray-400',
        forceExpand = false,
        plainHeader = false
      } = options;

      const folderHeader = document.createElement('div');
      folderHeader.className = [plainHeader ? 'default-folder-header' : 'folder-group-header', headerMarginClass, headerIndentClass, collapsed ? 'collapsed' : '']
        .filter(Boolean)
        .join(' ');
      folderHeader.innerHTML = `
        <div class="flex min-w-0 flex-1 items-center gap-2 ${plainHeader ? '' : 'overflow-hidden'}">
          <span class="shrink-0 text-sm">${collapsed ? '▶' : '▼'}</span>
          <span class="shrink-0 text-lg">🗂️</span>
          <span class="${plainHeader ? '' : 'block truncate'}">${folder.name}</span>
        </div>
        <div class="${plainHeader ? 'shrink-0 text-[11px] text-gray-400' : 'shrink-0 text-xs bg-white/80 px-2 py-1 rounded-full border border-[var(--theme-border)]'}">${folderDrafts.length}件</div>
      `;
      folderHeader.onclick = () => toggleFolderCollapse(folder.id);
      listEl.appendChild(folderHeader);

      if (collapsed) {
        return;
      }

      if (folderDrafts.length === 0) {
        const empty = document.createElement('div');
        empty.className = emptyClass;
        empty.textContent = 'このフォルダに下書きはありません';
        listEl.appendChild(empty);
        return;
      }

      const yearGroups = new Map();

      folderDrafts.forEach(item => {
        const targetDate = item.createdAt || item.sortDate;
        const yearKey = getYearKey(targetDate) || 'unknown';
        if (!yearGroups.has(yearKey)) {
          yearGroups.set(yearKey, {
            label: formatYearLabel(targetDate) || '日付未設定',
            items: []
          });
        }
        yearGroups.get(yearKey).items.push(item);
      });

      yearGroups.forEach((group, yearKey) => {
        const yearCollapsed = forceExpand ? false : isYearGroupCollapsed(folder.id, yearKey);
        const yearHeader = document.createElement('div');
        yearHeader.className = `year-group-header ${yearIndentClass} ${yearCollapsed ? 'collapsed' : ''}`;
        yearHeader.innerHTML = `
          <div class="flex min-w-0 flex-1 items-center gap-2 overflow-hidden">
            <span class="shrink-0 text-xs">${yearCollapsed ? '▶' : '▼'}</span>
            <span class="block truncate">${group.label}</span>
          </div>
          <div class="shrink-0 text-[11px] text-gray-400">${group.items.length}件</div>
        `;
        yearHeader.onclick = () => toggleYearGroupCollapse(folder.id, yearKey);
        listEl.appendChild(yearHeader);

        if (yearCollapsed) {
          return;
        }

        let lastMonthKey = '';

        group.items.forEach(item => {
          const targetDate = item.createdAt || item.sortDate;
          const currentMonthKey = getYearMonthKey(targetDate);

          if (currentMonthKey && currentMonthKey !== lastMonthKey) {
            const monthHeader = document.createElement('div');
            monthHeader.className = `month-header ${monthIndentClass} flex items-center justify-between gap-2`;

            const monthLabel = formatMonthLabel(targetDate);
            const label = document.createElement('span');
            label.textContent = monthLabel;
            monthHeader.appendChild(label);

            if (isWpBatchSelectionMode) {
              const monthItems = group.items.filter(monthItem => {
                const monthDate = monthItem.createdAt || monthItem.sortDate;
                return getYearMonthKey(monthDate) === currentMonthKey;
              });
              const allSelected = monthItems.length > 0 && monthItems.every(monthItem => selectedDraftIds.has(String(monthItem.id)));
              const selectMonthBtn = document.createElement('button');
              selectMonthBtn.type = 'button';
              selectMonthBtn.className = 'shrink-0 rounded-full border border-blue-200 bg-white px-2 py-1 text-[10px] font-bold text-blue-500 hover:bg-blue-50 transition';
              selectMonthBtn.textContent = allSelected ? `${monthLabel}を解除` : `${monthLabel}を一括選択`;
              selectMonthBtn.onclick = event => {
                event.stopPropagation();
                setDraftsSelected(monthItems.map(monthItem => monthItem.id), !allSelected);
              };
              monthHeader.appendChild(selectMonthBtn);
            }

            listEl.appendChild(monthHeader);
            lastMonthKey = currentMonthKey;
          }

          const div = document.createElement('div');
          const isSelected = (editMode === 'draft' && currentId === item.id);
          const isChecked = selectedDraftIds.has(String(item.id));
          div.className = `nav-item ${itemIndentClass} ${isSelected ? 'selected' : ''} ${isWpBatchSelectionMode && isChecked ? 'draft-batch-selected' : ''}`;

          const dateStr = formatDate(targetDate);

          const checkboxHtml = isWpBatchSelectionMode ? `
            <label class="shrink-0 flex items-center px-1 cursor-pointer" title="まとめWP用に選択">
              <input type="checkbox" class="draft-select-checkbox w-4 h-4 text-[var(--theme-main)] rounded focus:ring-[var(--theme-main)]" ${isChecked ? 'checked' : ''}>
            </label>` : '';

          div.innerHTML = `
            ${checkboxHtml}
            <div class="flex-1 min-w-0">
              <div class="font-bold text-gray-700 truncate">${item.subject || '(無題)'}</div>
              <div class="text-xs text-gray-400 mt-1">${dateStr}</div>
            </div>
          `;
          const checkbox = div.querySelector('.draft-select-checkbox');
          if (checkbox) {
            checkbox.addEventListener('click', e => e.stopPropagation());
            checkbox.addEventListener('change', e => {
              setDraftSelected(item.id, e.target.checked);
              div.classList.toggle('draft-batch-selected', e.target.checked);
            });
          }
          div.onclick = () => {
            loadDraft(item.id);
            if(window.innerWidth < 768) toggleSidebar();
          };
          listEl.appendChild(div);
        });
      });
    }

    async function ensureDefaultFolder() {
      let folder = await db.folders.where('name').equals(DEFAULT_FOLDER_NAME).first();
      const legacyFolder = await db.folders.where('name').equals(LEGACY_DEFAULT_FOLDER_NAME).first();

      if (!folder && legacyFolder) {
        await db.folders.update(legacyFolder.id, {
          name: DEFAULT_FOLDER_NAME
        });
        folder = await db.folders.get(legacyFolder.id);
      }

      if (!folder) {
        const now = new Date();
        const id = await db.folders.add({
          name: DEFAULT_FOLDER_NAME,
          createdAt: now.toISOString(),
          updatedAt: now.toLocaleString('ja-JP'),
          sortDate: now.toISOString()
        });
        folder = await db.folders.get(id);
      }

      await db.drafts.toCollection().modify(draft => {
        if (draft.folderId === undefined || draft.folderId === null || draft.folderId === '') {
          draft.folderId = folder.id;
        }
      });

      return folder;
    }

    async function loadFolderDropdowns() {
      const defaultFolder = await ensureDefaultFolder();
      let folders = await ensureFolderOrders();
      folders = sortFoldersForDisplay(folders);

      const editSelect = document.getElementById('select-draft-folder');
      const managerSelect = document.getElementById('select-folder-manager');
      const currentEdit = currentDraftFolderId;
      const currentManager = managerSelect.value;

      editSelect.innerHTML = '';
      managerSelect.innerHTML = '<option value="">フォルダを選択</option>';

      folders.forEach(folder => {
        const editOption = document.createElement('option');
        editOption.value = folder.id;
        editOption.textContent = folder.name;
        editSelect.appendChild(editOption);

        const managerOption = document.createElement('option');
        managerOption.value = folder.id;
        managerOption.textContent = folder.name;
        managerSelect.appendChild(managerOption);
      });

      if (currentManager && folders.some(folder => String(folder.id) === String(currentManager))) {
        managerSelect.value = currentManager;
      }

      if (currentEdit && folders.some(folder => String(folder.id) === String(currentEdit))) {
        editSelect.value = currentEdit;
      } else {
        currentDraftFolderId = defaultFolder.id;
        editSelect.value = defaultFolder.id;
      }
    }

    async function createFolder() {
      const name = prompt('新しいフォルダ名を入力してください');
      if (!name) return;

      const trimmed = name.trim();
      if (!trimmed) {
        showToast('⚠️ フォルダ名を入力してください');
        return;
      }

      const exists = await db.folders.where('name').equals(trimmed).first();
      if (exists) {
        showToast('⚠️ 同じ名前のフォルダがあります');
        return;
      }

      const now = new Date();
      const folders = await ensureFolderOrders();
      const nextOrder = folders
        .filter(folder => folder.name !== DEFAULT_FOLDER_NAME)
        .reduce((max, folder) => Math.max(max, getFolderOrderValue(folder)), 0) + 1;
      const id = await db.folders.add({
        name: trimmed,
        order: nextOrder,
        createdAt: now.toISOString(),
        updatedAt: now.toLocaleString('ja-JP'),
        sortDate: now.toISOString()
      });

      const collapsedIds = getCollapsedFolderIds().filter(key => key !== CUSTOM_FOLDER_GROUP_KEY);
      setCollapsedFolderIds([...collapsedIds, String(id)]);
      currentDraftFolderId = id;
      await loadFolderDropdowns();
      await refreshSidebarAfterFolderChange();
      showToast(`🗂️ 「${trimmed}」を作成しました`);
    }

    async function refreshSidebarAfterFolderChange() {
      if (activeTab === 'settings') {
        await loadSettingsList();
        return;
      }

      if (activeTab === 'drafts') {
        await loadDraftList();
      }
    }

    async function moveCurrentFolder(direction) {
      const managerValue = document.getElementById('select-folder-manager').value;
      if (!managerValue) {
        showToast('⚠️ 並べ替えるフォルダを選んでください');
        return;
      }

      const folderId = parseInt(managerValue, 10);
      const folder = await db.folders.get(folderId);
      if (!folder) return;

      if (folder.name === DEFAULT_FOLDER_NAME) {
        showToast('⚠️ 随時フォルダは移動できません');
        return;
      }

      const folders = sortFoldersForDisplay(await ensureFolderOrders());
      const customFolders = folders.filter(item => item.name !== DEFAULT_FOLDER_NAME);
      const currentIndex = customFolders.findIndex(item => String(item.id) === String(folderId));
      const targetIndex = currentIndex + direction;

      if (currentIndex === -1) return;
      if (targetIndex < 0 || targetIndex >= customFolders.length) {
        showToast(direction < 0 ? '⚠️ これ以上上へは移動できません' : '⚠️ これ以上下へは移動できません');
        return;
      }

      const targetFolder = customFolders[targetIndex];

      await db.transaction('rw', db.folders, async () => {
        await db.folders.update(folder.id, { order: targetFolder.order });
        await db.folders.update(targetFolder.id, { order: folder.order });
      });

      await loadFolderDropdowns();
      document.getElementById('select-folder-manager').value = folder.id;
      await refreshSidebarAfterFolderChange();
      showToast(direction < 0 ? '⬆️ フォルダを上へ移動しました' : '⬇️ フォルダを下へ移動しました');
    }

    async function renameCurrentFolder() {
      const managerValue = document.getElementById('select-folder-manager').value;
      if (!managerValue) {
        showToast('⚠️ まず変更したいフォルダを選んでください');
        return;
      }

      const folderId = parseInt(managerValue);
      const folder = await db.folders.get(folderId);
      if (!folder) return;

      if (folder.name === DEFAULT_FOLDER_NAME) {
        showToast('⚠️ 随時フォルダの名前は変更できません');
        return;
      }

      const nextName = prompt('新しいフォルダ名を入力してください', folder.name);
      if (!nextName) return;
      const trimmed = nextName.trim();
      if (!trimmed) {
        showToast('⚠️ フォルダ名を入力してください');
        return;
      }

      const duplicate = await db.folders.where('name').equals(trimmed).first();
      if (duplicate && duplicate.id !== folderId) {
        showToast('⚠️ 同じ名前のフォルダがあります');
        return;
      }

      await db.folders.update(folderId, {
        name: trimmed,
        updatedAt: new Date().toLocaleString('ja-JP'),
        sortDate: new Date().toISOString()
      });
      await loadFolderDropdowns();
      await refreshSidebarAfterFolderChange();
      showToast('✏️ フォルダ名を変更しました');
    }

    async function deleteCurrentFolder() {
      const managerValue = document.getElementById('select-folder-manager').value;
      if (!managerValue) {
        showToast('⚠️ 削除するフォルダを選んでください');
        return;
      }

      const folderId = parseInt(managerValue);
      const folder = await db.folders.get(folderId);
      if (!folder) return;

      if (folder.name === DEFAULT_FOLDER_NAME) {
        showToast('⚠️ 随時フォルダは削除できません');
        return;
      }

      if (!confirm(`「${folder.name}」を削除しますか？\n中の下書きは随時へ移動します。`)) return;

      const defaultFolder = await ensureDefaultFolder();
      await db.transaction('rw', db.folders, db.drafts, async () => {
        await db.drafts.where('folderId').equals(folderId).modify(draft => {
          draft.folderId = defaultFolder.id;
        });
        await db.folders.delete(folderId);
      });

      if (String(currentDraftFolderId) === String(folderId)) {
        currentDraftFolderId = defaultFolder.id;
      }
      await loadFolderDropdowns();
      await refreshSidebarAfterFolderChange();
      showToast('🗑️ フォルダを削除しました');
    }

    async function loadDraftList() {

      const safeKeyword = keyword.replace(/\s+/g, '');
      const folders = await ensureFolderOrders();

      let drafts = await db.drafts.toArray();

          tmpDiv.innerHTML = d.content;
          const bodyText = (tmpDiv.textContent || tmpDiv.innerText || '').toLowerCase().replace(/\s+/g, '');
          const subj = (d.subject || '').toLowerCase().replace(/\s+/g, '');
          const dateText = buildDateSearchText(d.createdAt || d.sortDate);

    function addFolderDnDContainerHandlers(container) {
      if (container.dataset.folderDndBound === 'true') return;
      container.addEventListener('dragover', handleFolderDragOver);
      container.addEventListener('drop', handleFolderDrop);
      container.dataset.folderDndBound = 'true';
    }

    function addFolderDnDItemHandlers(item) {
      item.addEventListener('dragstart', handleFolderDragStart);
      item.addEventListener('dragover', handleFolderDragOver);
      item.addEventListener('drop', handleFolderDrop);
      item.addEventListener('dragend', handleFolderDragEnd);
    }

    function handleFolderDragStart(e) {
      isFolderSortDragging = true;
      this.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', this.dataset.id || '');
    }

    function handleFolderDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';

      const container = e.currentTarget.classList.contains('folder-sort-item')
        ? e.currentTarget.parentElement
        : e.currentTarget;
      const draggingItem = container.querySelector('.folder-sort-item.dragging');
      if (!draggingItem) return;

      const afterElement = getFolderDragAfterElement(container, e.clientY);
      const fixedItem = container.querySelector('.folder-sort-item[data-draggable="false"]');

      if (afterElement == null) {
        if (fixedItem) {
          container.insertBefore(draggingItem, fixedItem);
        } else {
          container.appendChild(draggingItem);
        }
      } else {
        container.insertBefore(draggingItem, afterElement);
      }
    }

    function handleFolderDrop(e) {
      e.preventDefault();
    }

    async function handleFolderDragEnd() {
      this.classList.remove('dragging');
      const container = this.parentElement;
      if (!container) {
        isFolderSortDragging = false;
        return;
      }

      const updates = [...container.querySelectorAll('.folder-sort-item[data-draggable="true"]')]
        .map((item, index) => ({
          id: parseInt(item.dataset.id, 10),
          order: index + 1
        }))
        .filter(update => Number.isFinite(update.id));

      if (updates.length > 0) {
        await db.transaction('rw', db.folders, async () => {
          for (const update of updates) {
            await db.folders.update(update.id, { order: update.order });
          }
        });

        await loadFolderDropdowns();
        await refreshSidebarAfterFolderChange();
        showToast('↕️ フォルダ順を変更しました');
      }

      window.setTimeout(() => {
        isFolderSortDragging = false;
      }, 0);
    }

    function getFolderDragAfterElement(container, y) {
      const draggableElements = [...container.querySelectorAll('.folder-sort-item[data-draggable="true"]:not(.dragging)')];

      return draggableElements.reduce((closest, child) => {
        const box = child.getBoundingClientRect();
        const offset = y - box.top - box.height / 2;

        if (offset < 0 && offset > closest.offset) {
          return { offset: offset, element: child };
        } else {
          return closest;
        }
      }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    function createHFListItem(item, type, container, options = {}) {

    }

    // ★ 定型文リスト描画関数 (DnD対応)
    async function loadSnippetList() {
      let snippets = await db.snippets.toArray();
      
      // order初期化チェック
      let needUpdate = false;
      snippets.sort((a, b) => {
        const dateA = a.createdAt || a.sortDate || '';
        const dateB = b.createdAt || b.sortDate || '';
        return dateA < dateB ? 1 : -1; 
      });
      
      snippets.forEach((s, i) => {
        if (s.order === undefined) {
          s.order = i; 
          needUpdate = true;
        }
      });
      if(needUpdate) await db.snippets.bulkPut(snippets);

      // order順ソート
      snippets.sort((a, b) => a.order - b.order);

      const listEl = document.getElementById('list-container');
      listEl.innerHTML = '';
      
      if(snippets.length === 0) {
        listEl.innerHTML = `<div class="p-8 text-center text-gray-400 text-sm">
          まだ定型文がありません。<br>「＋新しい定型文」から登録しましょう！
        </div>`;
        loadQuickSnippets(); 
        return;
      }

      snippets.forEach((item) => {
        const div = document.createElement('div');
        const isEditing = (editMode === 'snippet' && currentId === item.id);
        
        // ドラッグ可能にする
        div.draggable = true;
        div.dataset.id = item.id;
        
        const bgClass = isEditing ? 'selected' : '';
        div.className = `snippet-item ${bgClass}`;

        // ハンドル(⋮⋮)を追加
        div.innerHTML = `
          <div class="cursor-grab text-gray-300 hover:text-[var(--theme-main)] px-2 select-none text-lg leading-none flex items-center handle" title="ドラッグで移動">⋮⋮</div>
          <div class="flex-1 min-w-0 pr-2 pl-1" onclick="loadSnippetEditor(${item.id})">
            <div class="font-bold text-gray-700 text-sm truncate">📌 ${item.name || '(名称なし)'}</div>
            <div class="text-[10px] text-gray-400 mt-1 truncate max-h-8 opacity-70">${stripHtml(item.content)}</div>
          </div>
          <button onclick="loadSnippetEditor(${item.id})" class="p-2 text-gray-300 hover:text-[var(--theme-main)] transition shrink-0 border-l border-gray-100" title="編集">
            ✏️
          </button>
        `;
        
        // イベントリスナー追加
        addDnDHandlers(div);
        
        listEl.appendChild(div);
      });
      
      loadQuickSnippets();
    }
    
    // --- DnD ロジック ---
    function addDnDHandlers(item) {
        item.addEventListener('dragstart', handleDragStart);
        item.addEventListener('dragover', handleDragOver);
        item.addEventListener('drop', handleDrop);
        item.addEventListener('dragend', handleDragEnd);
    }
    
    function handleDragStart(e) {
        this.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', this.dataset.id);
    }

    function handleDragOver(e) {
        e.preventDefault(); 
        e.dataTransfer.dropEffect = 'move';
        
        const container = document.getElementById('list-container');
        const afterElement = getDragAfterElement(container, e.clientY);
        const draggable = document.querySelector('.dragging');
        
        if (afterElement == null) {
            container.appendChild(draggable);
        } else {
            container.insertBefore(draggable, afterElement);
        }
    }
    
    function handleDrop(e) {
        e.preventDefault();
    }
    
    async function handleDragEnd(e) {
        this.classList.remove('dragging');
        
        const items = document.querySelectorAll('.snippet-item');
        const updates = [];
        
        items.forEach((item, index) => {
             const id = parseInt(item.dataset.id);
             updates.push({ id: id, order: index });
        });
        
        await db.transaction('rw', db.snippets, async () => {
           for(const up of updates) {
               await db.snippets.update(up.id, { order: up.order });
           }
        });
        
        loadQuickSnippets();
    }
    
    function getDragAfterElement(container, y) {
        const draggableElements = [...container.querySelectorAll('.snippet-item:not(.dragging)')];
        
        return draggableElements.reduce((closest, child) => {
            const box = child.getBoundingClientRect();
            const offset = y - box.top - box.height / 2;
            
            if (offset < 0 && offset > closest.offset) {
                return { offset: offset, element: child };
            } else {
                return closest;
            }
        }, { offset: Number.NEGATIVE_INFINITY }).element;
    }


    // ★ 定型文クイック挿入（挿入処理）
    async function onSnippetInsert(id) {
        const item = await db.snippets.get(id);
        if(!item) return;

        quill.focus();
        let range = quill.getSelection(true);
        if (range) {
            quill.clipboard.dangerouslyPasteHTML(range.index, item.content);
            quill.setSelection(range.index + quill.getLength(), Quill.sources.SILENT);
            showToast(`📌 「${item.name}」を挿入しました`);
        } else {
            showToast('❌ カーソル位置が特定できません');
        }
    }

      resetActionStates();
      setEditorUI('draft', false);
      document.getElementById('input-subject').value = '';
      quill.root.innerHTML = ''; 
      setDraftDateValue(new Date().toISOString());

        };
