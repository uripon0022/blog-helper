<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>楽天ブログ投稿ヘルパー</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      }

      body {
        margin: 0;
        min-width: 320px;
        background: linear-gradient(180deg, #fffdf5 0%, #fff 100%);
        color: #2d2a26;
      }

      main {
        padding: 18px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 18px;
      }

      p {
        margin: 0 0 12px;
        font-size: 13px;
        line-height: 1.6;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 12px;
        padding: 12px 14px;
        font: inherit;
        font-weight: 700;
        color: #fff;
        background: #d94d1a;
        cursor: pointer;
      }

      .hint {
        margin-top: 10px;
        color: #6b6257;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>楽天ブログ投稿ヘルパー</h1>
      <p>記事を作成して保存し、楽天ブログの投稿画面へ安全に転送します。公開ボタンは自動で押しません。</p>
      <button id="open-app" type="button">作成ツールを開く</button>
      <div class="hint">初回は投稿画面URLを設定しておくと転送が安定します。</div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
